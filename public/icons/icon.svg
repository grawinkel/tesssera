<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- QR Code Pattern (stylized) -->
  <g fill="#e94560">
    <!-- Top left corner -->
    <rect x="80" y="80" width="80" height="80" rx="8"/>
    <rect x="96" y="96" width="48" height="48" rx="4" fill="#1a1a2e"/>
    <rect x="112" y="112" width="16" height="16" rx="2" fill="#e94560"/>
    <!-- Top right corner -->
    <rect x="352" y="80" width="80" height="80" rx="8"/>
    <rect x="368" y="96" width="48" height="48" rx="4" fill="#1a1a2e"/>
    <rect x="384" y="112" width="16" height="16" rx="2" fill="#e94560"/>
    <!-- Bottom left corner -->
    <rect x="80" y="352" width="80" height="80" rx="8"/>
    <rect x="96" y="368" width="48" height="48" rx="4" fill="#1a1a2e"/>
    <rect x="112" y="384" width="16" height="16" rx="2" fill="#e94560"/>
    <!-- Center pattern (split symbol) -->
    <rect x="200" y="200" width="112" height="112" rx="12"/>
    <rect x="216" y="216" width="80" height="80" rx="8" fill="#1a1a2e"/>
    <!-- Split lines -->
    <rect x="248" y="176" width="16" height="160" rx="4"/>
    <rect x="176" y="248" width="160" height="16" rx="4"/>
    <!-- Data dots -->
    <circle cx="192" y="192" r="12"/>
    <circle cx="320" cy="192" r="12"/>
    <circle cx="192" cy="320" r="12"/>
    <circle cx="320" cy="320" r="12"/>
    <circle cx="256" cy="144" r="8"/>
    <circle cx="256" cy="368" r="8"/>
    <circle cx="144" cy="256" r="8"/>
    <circle cx="368" cy="256" r="8"/>
  </g>
  <!-- V letter accent -->
  <path d="M240 420 L256 460 L272 420" stroke="#e94560" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
